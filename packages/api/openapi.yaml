openapi: 3.1.0

info:
  title: Medical App API
  version: 1.0.0
  description: REST API for the Medical App application

servers:
  - url: /api
    description: Default server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User account management
  - name: Admin
    description: Admin-only system endpoints
  - name: Catalog
    description: Global read-only reference tables
  - name: Conditions
    description: User-tracked health conditions
  - name: Symptoms
    description: User-tracked symptoms
  - name: Medications
    description: User medication inventory
  - name: Clinics
    description: User-saved clinic registry
  - name: Doctors
    description: Global doctor catalog
  - name: Profile
    description: Current user's health profile links
  - name: Entries
    description: Daily health log entries
  - name: Visits
    description: Doctor visit history
  - name: Analytics
    description: Trends and dashboard analytics
  - name: AI Reports
    description: AI-generated appointment prep reports

# ─── Reusable components ───────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: HttpOnly access token cookie set on login

  schemas:
    RegisterBody:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter and one number
          example: Password1
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Doe

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 1
          example: Password1

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        role:
          type: string
          enum: [user, admin]
          example: user
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              example: Success

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

    # ── Auth & Account ──────────────────────────────────────────────────────────
    RefreshBody:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: 8f2c...

    LogoutBody:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: 8f2c...

    UpdateUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
          example: newemail@example.com
        password:
          type: string
          minLength: 8
          example: NewerP@ss1

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 5b1f...-uuid
        email:
          type: string
          format: email
          example: patient@example.com
        roleId:
          type: string
          format: uuid
          example: owner-role-uuid
        createdAt:
          type: string
          format: date-time
          example: "2026-06-21T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-21T09:00:00Z"

    # ── Catalog ─────────────────────────────────────────────────────────────────
    CatalogSymptom:
      type: object
      properties:
        id:
          type: string
          example: cat-sym-001
        name:
          type: string
          example: Headache
        category:
          type: string
          example: Neurological
        createdAt:
          type: string
          format: date-time
          example: "2026-01-10T00:00:00Z"

    CatalogCondition:
      type: object
      properties:
        id:
          type: string
          example: cat-cond-001
        name:
          type: string
          example: Rheumatoid Arthritis
        category:
          type: string
          example: Autoimmune
        createdAt:
          type: string
          format: date-time
          example: "2026-01-10T00:00:00Z"

    CatalogMedication:
      type: object
      properties:
        id:
          type: string
          example: cat-med-001
        name:
          type: string
          example: Ibuprofen
        strength:
          type: string
          example: 200mg
        category:
          type: string
          example: NSAID
        createdAt:
          type: string
          format: date-time
          example: "2026-01-10T00:00:00Z"

    # ── Health Profile ───────────────────────────────────────────────────────────
    UserCondition:
      type: object
      properties:
        id:
          type: string
          example: ucond-001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        conditionId:
          type: string
          nullable: true
          example: cat-cond-001
        customName:
          type: string
          nullable: true
          example: null
        description:
          type: string
          nullable: true
          example: Diagnosed by rheumatologist
        diagnosedDate:
          type: string
          format: date
          example: "2024-03-12"
        status:
          type: string
          example: active
        notes:
          type: string
          nullable: true
          example: null
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-15T00:00:00Z"

    ConditionBody:
      type: object
      properties:
        conditionId:
          type: string
          nullable: true
          example: cat-cond-001
        customName:
          type: string
          nullable: true
          example: null
        description:
          type: string
          nullable: true
          example: Diagnosed by rheumatologist
        diagnosedDate:
          type: string
          format: date
          example: "2024-03-12"
        status:
          type: string
          example: active
        notes:
          type: string
          nullable: true
          example: null
    SymptomBody:
      type: object
      properties:
        catalogId:
          type: string
          nullable: true
          example: cat-sym-002
        customName:
          type: string
          nullable: true
          example: null

    # ── Medication Inventory ─────────────────────────────────────────────────────
    UserMedication:
      type: object
      properties:
        id:
          type: string
          example: umed-001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        medicationId:
          type: string
          nullable: true
          example: cat-med-001
        customName:
          type: string
          nullable: true
          example: null
        frequency:
          type: string
          example: Twice daily
        notes:
          type: string
          nullable: true
          example: Take with food
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-15T00:00:00Z"

    MedicationBody:
      type: object
      properties:
        medicationId:
          type: string
          nullable: true
          example: cat-med-001
        customName:
          type: string
          nullable: true
          example: null
        frequency:
          type: string
          example: Twice daily
        notes:
          type: string
          nullable: true
          example: Take with food

    # ── Doctor & Clinic Registry ─────────────────────────────────────────────────
    UserClinic:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 81000000-0000-0000-0000-000000000001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        clinicId:
          type: string
          format: uuid
          example: 70000000-0000-0000-0000-000000000001
        notes:
          type: string
          nullable: true
          example: Parking on 4th St
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        clinic:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            address:
              type: string
            phone:
              type: string

    CreateUserClinicBody:
      type: object
      required: [clinicId]
      properties:
        clinicId:
          type: string
          format: uuid
          example: 70000000-0000-0000-0000-000000000001
        notes:
          type: string
          maxLength: 5000
          nullable: true
          example: Parking on 4th St

    UpdateUserClinicBody:
      type: object
      minProperties: 1 
      properties:
        notes:
          type: string
          minLength: 5000
          nullable: true
          example: New entrance on 5th St

    UserDoctor:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 50000000-0000-0000-0000-000000000001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        doctorId:
          type: string
          format: uuid
          example: 40000000-0000-0000-0000-000000000001
        userClinicId:
          type: string
          format: uuid
          nullable: true
          example: 60000000-0000-0000-0000-000000000001
        notes:
          type: string
          nullable: true
          example: Primary cardiologist
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        doctor:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            specialty:
              type: string
            phone:
              type: string
        userClinic:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            clinicId:
              type: string
              format: uuid
            notes:
              type: string
              nullable: true

    CreateUserDoctorBody:
      type: object
      required: [doctorId]
      properties:
        doctorId:
          type: string
          format: uuid
          example: 40000000-0000-0000-0000-000000000001
        userClinicId:
          type: string
          format: uuid
          nullable: true
          example: 60000000-0000-0000-0000-000000000001
        notes:
          type: string
          maxLength: 5000
          nullable: true
          example: Rheumatologist

    UpdateUserDoctorBody:
      type: object
      properties:
        userClinicId:
          type: string
          format: uuid
          nullable: true
          example: 60000000-0000-0000-0000-000000000001
        notes:
          type: string
          maxLength: 5000
          nullable: true
          example: Switched to telehealth visits
      anyOf:
        - required: [userClinicId]
        - required: [notes]

    UserSymptom:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 50000000-0000-0000-0000-000000000001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        catalogId:
          type: string
          format: uuid
          example: 40000000-0000-0000-0000-000000000001
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-01T00:00:00Z"
        catalog:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            category:
              type: string
              nullable: true

    CreateUserSymptomBody:
      type: object
      required: [catalogId]
      properties:
        catalogId:
          type: string
          format: uuid
          example: 40000000-0000-0000-0000-000000000001

    # ── Daily Health Logger ──────────────────────────────────────────────────────
    DailyEntry:
      type: object
      properties:
        id:
          type: string
          example: entry-001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        entryDate:
          type: string
          format: date
          example: "2026-06-20"
        moodRating:
          type: integer
          minimum: 1
          maximum: 10
          example: 3
        sleepHours:
          type: number
          format: float
          example: 6.5
        journalNotes:
          type: string
          nullable: true
          example: Rough night, knee pain flared up
        createdAt:
          type: string
          format: date-time
          example: "2026-06-20T21:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-20T21:00:00Z"

    DailyEntryDetail:
      allOf:
        - $ref: "#/components/schemas/DailyEntry"
        - type: object
          properties:
            symptoms:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: esym-001
                  userSymptomId:
                    type: string
                    example: usym-001
                  severity:
                    type: integer
                    example: 6
                  notes:
                    type: string
                    nullable: true
                    example: null
            medications:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: emed-001
                  userMedicationId:
                    type: string
                    example: umed-001
                  quantity:
                    type: integer
                    example: 1
                  unit:
                    type: string
                    example: tablet
                  taken:
                    type: boolean
                    example: true
                  takenAt:
                    type: string
                    format: date-time
                    example: "2026-06-20T08:00:00Z"
            conditions:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: econd-001
                  userConditionId:
                    type: string
                    example: ucond-001
                  status:
                    type: string
                    example: active
                  notes:
                    type: string
                    nullable: true
                    example: null

    EntryBody:
      type: object
      required: [entryDate]
      properties:
        entryDate:
          type: string
          format: date
          example: "2026-06-21"
        moodRating:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        sleepHours:
          type: number
          format: float
          example: 7
        journalNotes:
          type: string
          nullable: true
          example: Better day overall
        symptoms:
          type: array
          items:
            type: object
            properties:
              userSymptomId:
                type: string
                example: usym-001
              severity:
                type: integer
                example: 3
              notes:
                type: string
                nullable: true
                example: null
        medications:
          type: array
          items:
            type: object
            properties:
              userMedicationId:
                type: string
                example: umed-001
              quantity:
                type: integer
                example: 1
              unit:
                type: string
                example: tablet
              taken:
                type: boolean
                example: true
              takenAt:
                type: string
                format: date-time
                example: "2026-06-21T08:00:00Z"
        conditions:
          type: array
          items:
            type: object
            properties:
              userConditionId:
                type: string
                example: ucond-001
              status:
                type: string
                example: active
              notes:
                type: string
                nullable: true
                example: null

    EntrySymptomBody:
      type: object
      required: [userSymptomId, severity]
      properties:
        userSymptomId:
          type: string
          example: usym-001
        severity:
          type: integer
          minimum: 1
          maximum: 10
          example: 6
        notes:
          type: string
          nullable: true
          example: Worse after standing all day

    EntryMedicationBody:
      type: object
      required: [userMedicationId, taken]
      properties:
        userMedicationId:
          type: string
          example: umed-001
        quantity:
          type: integer
          example: 1
        unit:
          type: string
          example: tablet
        taken:
          type: boolean
          example: true
        takenAt:
          type: string
          format: date-time
          example: "2026-06-21T08:05:00Z"
        notes:
          type: string
          nullable: true
          example: null

    EntryConditionBody:
      type: object
      required: [userConditionId, status]
      properties:
        userConditionId:
          type: string
          example: ucond-001
        status:
          type: string
          example: active
        notes:
          type: string
          nullable: true
          example: Flare-up today

    # ── Visit History ────────────────────────────────────────────────────────────
    DoctorVisit:
      type: object
      properties:
        id:
          type: string
          example: visit-001
        entryId:
          type: string
          example: entry-001
        userDoctorId:
          type: string
          example: udoc-001
        userClinicId:
          type: string
          nullable: true
          example: uclinic-001
        summary:
          type: string
          example: Discussed knee pain, adjusted dosage
        notes:
          type: string
          nullable: true
          example: Follow-up in 6 weeks
        createdAt:
          type: string
          format: date-time
          example: "2026-06-20T15:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-20T15:00:00Z"

    VisitBody:
      type: object
      required: [userDoctorId, summary]
      properties:
        userDoctorId:
          type: string
          example: udoc-001
        userClinicId:
          type: string
          nullable: true
          example: uclinic-001
        summary:
          type: string
          example: Discussed knee pain, adjusted dosage
        notes:
          type: string
          nullable: true
          example: Follow-up in 6 weeks

    # ── AI Reports ───────────────────────────────────────────────────────────────
    AIReport:
      type: object
      properties:
        id:
          type: string
          example: report-001
        userId:
          type: string
          format: uuid
          example: 5b1f...-uuid
        dateRangeStart:
          type: string
          format: date
          example: "2026-05-22"
        dateRangeEnd:
          type: string
          format: date
          example: "2026-06-21"
        reportType:
          type: string
          example: physician_ready
        reportContent:
          type: object
          properties:
            symptomTimeline:
              type: array
              items:
                type: object
                properties:
                  symptom:
                    type: string
                    example: Fatigue
                  daysReported:
                    type: integer
                    example: 12
                  trend:
                    type: string
                    example: worsening
            medicationAdherence:
              type: array
              items:
                type: object
                properties:
                  medication:
                    type: string
                    example: Ibuprofen 200mg
                  adherenceRate:
                    type: number
                    format: float
                    example: 0.85
            notableEvents:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    example: "2026-06-10"
                  note:
                    type: string
                    example: Severe pain logged, sleep under 4 hours
        createdAt:
          type: string
          format: date-time
          example: "2026-06-21T11:00:00Z"

    AIReportBody:
      type: object
      required: [startDate, endDate, reportType]
      properties:
        startDate:
          type: string
          format: date
          example: "2026-05-22"
        endDate:
          type: string
          format: date
          example: "2026-06-21"
        reportType:
          type: string
          example: physician_ready

# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive auth cookies
      operationId: login
      description: >
        On success, sets two HttpOnly cookies: `accessToken` (15 min) and
        `refreshToken` (7 days). Include `credentials: "include"` in fetch calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: accessToken=...; HttpOnly; Path=/api
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the access token
      operationId: refreshToken
      description: Reads the `refreshToken` cookie and issues new auth cookies.
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear auth cookies
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Users ────────────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get the logged-in user's own profile
      operationId: getUsersMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Users]
      summary: Update email and/or password
      operationId: updateUsersMe
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
